<style>
    :root {
        --primary: #4c3fae;
        /* Deep Purple */
        --primary-light: #6f42c1;
        --secondary: #ffae00;
        /* Orange */
        --success: #1cc88a;
        --danger: #e74a3b;
        --info: #36b9cc;
        --light: #f3f5f9;
        /* Light Gray Background */
        --dark: #1f1f39;
        --white: #ffffff;
        --gray: #8898aa;
        --sidebar-width: 260px;
        --card-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        /* Soft Shadow */
    }

    /* RESET & BASE */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background-color: var(--light);
        color: var(--dark);
        height: 100vh;
        overflow: hidden;
        display: flex;
    }

    /* HELPER CLASSES */
    .hidden {
        display: none !important;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.2s;
        font-size: 14px;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
    }

    .btn-success {
        background: var(--success);
        color: white;
    }

    .btn-danger {
        background: var(--danger);
        color: white;
    }

    .btn-warning {
        background: var(--secondary);
        color: white;
    }

    .btn:hover {
        opacity: 0.95;
        transform: translateY(-1px);
        box-shadow: 0 4px 6px rgba(50, 50, 93, 0.11);
    }

    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .badge-success {
        background: #d4edda;
        color: #155724;
    }

    .badge-danger {
        background: #f8d7da;
        color: #721c24;
    }

    .badge-warning {
        background: #fff3cd;
        color: #856404;
    }

    /* SIDEBAR */
    .sidebar {
        width: var(--sidebar-width);
        background: linear-gradient(150deg, var(--primary) 0%, var(--primary-light) 100%);
        color: white;
        display: flex;
        flex-direction: column;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        z-index: 100;
    }

    .brand {
        padding: 30px 25px;
        font-size: 22px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-links {
        list-style: none;
        padding: 20px 0;
        flex: 1;
        overflow-y: auto;
    }

    .nav-item {
        padding: 14px 25px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.8);
        display: flex;
        align-items: center;
        gap: 15px;
        transition: 0.2s;
        font-size: 14px;
    }

    .nav-item:hover,
    .nav-item.active {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border-right: 4px solid var(--secondary);
    }

    /* MAIN LAYOUT */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--light);
    }

    .topbar {
        height: 75px;
        background: white;
        padding: 0 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.03);
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .avatar {
        width: 42px;
        height: 42px;
        background: var(--secondary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 16px;
    }

    .content-area {
        flex: 1;
        padding: 30px 40px;
        overflow-y: auto;
    }

    /* CARDS & DASHBOARD */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
        margin-bottom: 35px;
    }

    .stat-card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        display: flex;
        align-items: center;
        gap: 20px;
        transition: 0.3s;
    }

    .stat-card:hover {
        transform: translateY(-5px);
    }

    .stat-icon {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
    }

    .bg-purple-light {
        background: #ecebfc;
        color: var(--primary);
    }

    .bg-orange-light {
        background: #fff5e6;
        color: var(--secondary);
    }

    .bg-green-light {
        background: #e6fffa;
        color: var(--success);
    }

    .bg-red-light {
        background: #ffe6e6;
        color: var(--danger);
    }

    /* TABLES */
    .table-container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        margin-bottom: 30px;
    }

    .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 10px;
    }

    /* Modern Spacing */
    th {
        text-align: left;
        color: var(--gray);
        font-weight: 600;
        font-size: 13px;
        padding: 10px 15px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    td {
        background: white;
        padding: 15px;
        font-size: 14px;
        border-top: 1px solid #f0f0f0;
        border-bottom: 1px solid #f0f0f0;
    }

    td:first-child {
        border-left: 1px solid #f0f0f0;
        border-top-left-radius: 8px;
        border-bottom-left-radius: 8px;
    }

    td:last-child {
        border-right: 1px solid #f0f0f0;
        border-top-right-radius: 8px;
        border-bottom-right-radius: 8px;
    }

    tr:hover td {
        background: #fafafa;
    }

    /* FORMS & AUTH */
    .login-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: url('https://img.freepik.com/free-vector/gradient-purple-hexagonal-background_23-2148965956.jpg');
        background-size: cover;
        position: relative;
    }

    .login-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(76, 63, 174, 0.85);
    }

    .login-card {
        position: relative;
        background: white;
        padding: 45px;
        border-radius: 15px;
        width: 420px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-group label {
        display: block;
        margin-bottom: 10px;
        color: var(--gray);
        font-size: 13px;
        font-weight: 500;
    }

    .form-control {
        width: 100%;
        padding: 14px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        background: #fafafa;
    }

    .form-control:focus {
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 3px rgba(76, 63, 174, 0.1);
    }

    /* OVERLAYS */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
    }

    .modal-content {
        background: white;
        padding: 35px;
        border-radius: 12px;
        width: 500px;
        animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
        from {
            transform: translateY(20px);
            opacity: 0;
        }

        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    #toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--dark);
        color: white;
        padding: 15px 25px;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transform: translateY(100px);
        transition: 0.3s;
        z-index: 2000;
        font-size: 14px;
    }

    #toast.show {
        transform: translateY(0);
    }
</style>
